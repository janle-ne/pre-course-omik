<script src="data.js"></script>
<script>
    function renderSection(dataArray, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let htmlOutput = '';

        dataArray.forEach(chapter => {
            htmlOutput += `
            <section class="chapter" id="${chapter.id}">
              <div class="chapter-header">
                <div class="chapter-num">${chapter.chapterNum}</div>
                <div class="chapter-title">
                  <h2>${chapter.chapterTitle}</h2>
                  <p>${chapter.chapterSub}</p>
                </div>
              </div>
            `;

            chapter.blocks.forEach(block => {
                if (block.type === 'raw') {
                    htmlOutput += block.content;
                } else if (block.type === 'concept') {
                    htmlOutput += `
                    <div class="concept">
                        <div class="concept-title">${block.title}</div>
                        ${block.conceptEn ? `<div class="concept-en">${block.conceptEn}</div>` : ''}
                        <div class="concept-body">${block.content}</div>
                    </div>`;
                } else if (block.type === 'trap') {
                    htmlOutput += `
                    <div class="trap">
                        <div class="trap-title">${block.title}</div>
                        ${block.content}
                    </div>`;
                } else if (block.type === 'exercise') {
                    htmlOutput += `
                    <div class="exercise">
                        <div class="exercise-title">${block.title}</div>
                        ${block.content}
                    </div>`;
                } else if (block.type === 'formula') {
                    htmlOutput += `
                    <div class="formula">
                        <div class="label">${block.title}</div>
                        ${block.content}
                    </div>`;
                } else if (block.type === 'keywords') {
                    htmlOutput += `
                    <div class="keywords">
                        <div class="keywords-title">${block.title}</div>
                        <div class="kw-list">${block.content}</div>
                    </div>`;
                }
            });

            htmlOutput += `</section>`;
        });

        container.innerHTML = htmlOutput;
    }

    // Tự động gọi render cho cả 4 Section khi trang tải xong

        renderSection(section1Data, 'section1-main');
        renderSection(section2Data, 'section2-main');
        renderSection(section3Data, 'section3-main');
        renderSection(section4Data, 'section4-main');
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    });
</script>
